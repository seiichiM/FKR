<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>積立・複利計算シミュレーター</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (グラフ描画用) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192.png">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 flex justify-center">

    <div class="max-w-6xl w-full">
        <h1 class="text-2xl md:text-3xl font-bold text-center text-slate-700 mb-8 flex justify-center items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            積立・複利計算シミュレーター
        </h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- 左側：入力フォームエリア -->
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-md border border-slate-100 lg:col-span-1 flex flex-col gap-6">
                
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">初期投資額 (万円)</label>
                    <div class="relative">
                        <input type="number" id="initialAmount" value="0" min="0" step="1" class="w-full text-lg p-3 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none transition text-right">
                        <span class="absolute right-4 top-3.5 text-slate-400">万円</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">毎月の積立額 (万円)</label>
                    <div class="relative">
                        <input type="number" id="monthlyAmount" value="3" min="0" step="0.1" class="w-full text-lg p-3 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none transition text-right">
                        <span class="absolute right-4 top-3.5 text-slate-400">万円</span>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">想定利回り / 年率 (%)</label>
                    <div class="relative">
                        <input type="number" id="interestRate" value="5.0" min="0" max="100" step="0.1" class="w-full text-lg p-3 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none transition text-right">
                        <span class="absolute right-4 top-3.5 text-slate-400">%</span>
                    </div>
                    <p class="text-xs text-slate-400 mt-1">※一般的なインデックス投資の目安は3〜7%です</p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-2">運用期間 (年)</label>
                    <div class="relative">
                        <input type="number" id="years" value="20" min="1" max="50" step="1" class="w-full text-lg p-3 pr-10 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none transition text-right">
                        <span class="absolute right-4 top-3.5 text-slate-400">年</span>
                    </div>
                </div>

            </div>

            <!-- 右側：結果表示とグラフエリア -->
            <div class="lg:col-span-2 flex flex-col gap-6">
                
                <!-- 結果サマリー (上部) -->
                <div class="bg-emerald-600 text-white p-6 md:p-8 rounded-2xl shadow-md grid grid-cols-1 md:grid-cols-3 gap-6 text-center divide-y md:divide-y-0 md:divide-x divide-emerald-500">
                    <div class="pt-2 md:pt-0">
                        <p class="text-emerald-200 text-sm font-bold mb-1">投資元本 (積立総額)</p>
                        <p class="text-2xl md:text-3xl font-black tracking-tight"><span id="resultPrincipal">0</span> <span class="text-base font-normal">万円</span></p>
                    </div>
                    <div class="pt-4 md:pt-0">
                        <p class="text-emerald-200 text-sm font-bold mb-1">運用収益 (利益)</p>
                        <p class="text-2xl md:text-3xl font-black tracking-tight text-yellow-300"><span id="resultProfit">+ 0</span> <span class="text-base font-normal text-emerald-100">万円</span></p>
                    </div>
                    <div class="pt-4 md:pt-0">
                        <p class="text-emerald-100 text-sm font-bold mb-1">最終積立金額</p>
                        <p class="text-3xl md:text-4xl font-black tracking-tight"><span id="resultTotal">0</span> <span class="text-lg font-normal">万円</span></p>
                    </div>
                </div>

                <!-- グラフ (下部) -->
                <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 flex-1 flex flex-col">
                    <h2 class="text-sm font-bold text-slate-500 mb-4 text-center">資産推移シミュレーション</h2>
                    <div class="relative flex-1 w-full" style="min-height: 300px;">
                        <canvas id="compoundChart"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // DOM要素
        const inputs = ['initialAmount', 'monthlyAmount', 'interestRate', 'years'].map(id => document.getElementById(id));
        const resultPrincipal = document.getElementById('resultPrincipal');
        const resultProfit = document.getElementById('resultProfit');
        const resultTotal = document.getElementById('resultTotal');
        
        let myChart = null; // Chart.jsのインスタンス用

        // 数値をカンマ区切りにする関数 (例: 10000 -> 10,000)
        function formatNumber(num) {
            return Math.round(num).toLocaleString('ja-JP');
        }

        // 複利計算とグラフ更新を行う関数
        function calculateAndDraw() {
            // 入力値の取得 (単位を「万円」から「円」に直して計算すると精度が上がるが、今回はシンプルに万円ベースで計算)
            const initial = parseFloat(inputs[0].value) || 0;     // 初期投資(万円)
            const monthly = parseFloat(inputs[1].value) || 0;     // 毎月積立(万円)
            const rate = parseFloat(inputs[2].value) || 0;        // 年利(%)
            const years = parseInt(inputs[3].value) || 0;         // 年数

            const monthlyRate = (rate / 100) / 12; // 月利
            const totalMonths = years * 12;        // 総月数

            let currentTotal = initial; // 現在の合計金額
            let currentPrincipal = initial; // 現在の元本
            
            // グラフ描画用の配列
            const labels = [0]; // 0年目, 1年目...
            const principalData = [initial]; // 元本の推移
            const profitData = [0];          // 利益の推移

            // 月ごとに複利計算を実行
            for (let m = 1; m <= totalMonths; m++) {
                // 毎月の初めに積立
                currentTotal += monthly;
                currentPrincipal += monthly;

                // 月末に利息がつく
                currentTotal = currentTotal * (1 + monthlyRate);

                // 12ヶ月(1年)ごとにグラフ用のデータを記録
                if (m % 12 === 0) {
                    const year = m / 12;
                    labels.push(year + '年');
                    principalData.push(currentPrincipal);
                    profitData.push(currentTotal - currentPrincipal);
                }
            }

            // 最終結果の数値を画面に反映
            const finalProfit = currentTotal - currentPrincipal;
            resultPrincipal.textContent = formatNumber(currentPrincipal);
            resultProfit.textContent = '+' + formatNumber(finalProfit);
            resultTotal.textContent = formatNumber(currentTotal);

            // グラフの描画・更新
            updateChart(labels, principalData, profitData);
        }

        // グラフを描画する関数
        function updateChart(labels, principalData, profitData) {
            const ctx = document.getElementById('compoundChart').getContext('2d');

            // 既にグラフがあれば破棄して新しく描画する
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar', // 基本は棒グラフ
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '投資元本 (万円)',
                            data: principalData,
                            backgroundColor: '#3b82f6', // 青色
                            stack: 'Stack 0',
                        },
                        {
                            label: '運用利益 (万円)',
                            data: profitData,
                            backgroundColor: '#fcd34d', // 黄色
                            stack: 'Stack 0',
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                // ツールチップ(マウスオーバー時)の単位を万円にする
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) { label += ': '; }
                                    if (context.parsed.y !== null) {
                                        label += formatNumber(context.parsed.y) + ' 万円';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            stacked: true, // X軸を積み上げグラフに設定
                            grid: { display: false }
                        },
                        y: {
                            stacked: true, // Y軸を積み上げグラフに設定
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return value + '万'; // Y軸の目盛りに「万」をつける
                                }
                            }
                        }
                    }
                }
            });
        }

        // 全ての入力欄にイベントリスナーを設定 (入力するたびに自動計算)
        inputs.forEach(input => {
            input.addEventListener('input', calculateAndDraw);
        });

        // 初期表示時に1回計算を実行
        calculateAndDraw();
    </script>
</body>
</html>
